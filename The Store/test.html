<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cake Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }

        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }

        section {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .cake {
            margin-bottom: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .cake img {
            width: 100%;
            border-bottom: 1px solid #ddd;
        }

        .cake-info {
            padding: 15px;
        }

        h2 {
            color: #333;
        }

        p {
            color: #666;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }
    </style>
</head>

<body>

    <header>
        <h1>Your Cake Store</h1>
    </header>

    <section>
        <div class="cake">
            <img src="cake1.jpg" alt="Cake 1">
            <div class="cake-info">
                <h2>Chocolate Delight</h2>
                <p>A rich and moist chocolate cake, perfect for any occasion.</p>
            </div>
        </div>

        <div class="cake">
            <img src="cake2.jpg" alt="Cake 2">
            <div class="cake-info">
                <h2>Vanilla Bliss</h2>
                <p>Classic vanilla cake with layers of creamy frosting, a timeless favorite.</p>
            </div>
        </div>

        <!-- Add more cake items as needed -->

    </section>

    <footer>
        <p>Contact us at: <a href="mailto:info@yourcakestore.com">info@yourcakestore.com</a></p>
    </footer>

</body>

</html>
